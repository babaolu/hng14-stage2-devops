name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  # ghcr.io persists across all jobs — no more "manifest unknown" errors
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — LINT
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Python — flake8
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python (flake8)
        run: |
          flake8 api/main.py worker/worker.py \
            --max-line-length=100 \
            --extend-ignore=E501

      # JavaScript — eslint
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install eslint
        run: |
          cd frontend
          npm ci

      - name: Lint JavaScript (eslint)
        run: |
          cd frontend
          npx eslint app.js

      # Dockerfiles — hadolint
      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles (hadolint)
        continue-on-error: true
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — TEST
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r api/requirements-test.txt

      - name: Run pytest with coverage
        run: |
          cd api
          pytest -v
        env:
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
          QUEUE_NAME: "jobs"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml
          retention-days: 30


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — BUILD
# Pushes to ghcr.io which persists across all downstream jobs
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_PREFIX }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worker:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_PREFIX }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save SHA for downstream jobs
        run: echo "${{ steps.vars.outputs.sha_short }}" > sha.txt

      - name: Upload SHA artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-sha
          path: sha.txt


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4 — SECURITY SCAN
# Pulls images from ghcr.io — they exist because build job pushed them there
# ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
      security-events: write   # required to upload SARIF to Security tab

    steps:
      - uses: actions/checkout@v5

      - name: Download SHA artifact
        uses: actions/download-artifact@v4
        with:
          name: build-sha

      - name: Set SHA env
        run: echo "SHA=$(cat sha.txt)" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images from ghcr.io
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}/api:${{ env.SHA }}
          docker pull ${{ env.IMAGE_PREFIX }}/worker:${{ env.SHA }}
          docker pull ${{ env.IMAGE_PREFIX }}/frontend:${{ env.SHA }}

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output api-scan.sarif \
            ${{ env.IMAGE_PREFIX }}/api:${{ env.SHA }}

      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output worker-scan.sarif \
            ${{ env.IMAGE_PREFIX }}/worker:${{ env.SHA }}

      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output frontend-scan.sarif \
            ${{ env.IMAGE_PREFIX }}/frontend:${{ env.SHA }}

      - name: Upload SARIF results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: "*.sarif"
          retention-days: 30

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api-scan.sarif
        continue-on-error: true


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 5 — INTEGRATION TEST
# Pulls images from ghcr.io and runs the full stack
# ─────────────────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v5

      - name: Download SHA artifact
        uses: actions/download-artifact@v4
        with:
          name: build-sha

      - name: Set SHA env
        run: echo "SHA=$(cat sha.txt)" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env for compose
        run: |
          printf 'REDIS_PASSWORD=integration-test-secret\nQUEUE_NAME=jobs\n' > .env
          cat .env

      # compose.yml base → override file must be compose.override.yml
      - name: Write compose override to use pre-built images
        run: |
          cat > compose.override.yml << EOF
          services:
            api:
              image: ${{ env.IMAGE_PREFIX }}/api:${{ env.SHA }}
              build: null
            worker:
              image: ${{ env.IMAGE_PREFIX }}/worker:${{ env.SHA }}
              build: null
            frontend:
              image: ${{ env.IMAGE_PREFIX }}/frontend:${{ env.SHA }}
              build: null
          EOF

      - name: Pull images from ghcr.io
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}/api:${{ env.SHA }}
          docker pull ${{ env.IMAGE_PREFIX }}/worker:${{ env.SHA }}
          docker pull ${{ env.IMAGE_PREFIX }}/frontend:${{ env.SHA }}

      - name: Start full stack
        run: docker compose up -d --wait --timeout 120

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services..."
          timeout 120 bash -c '
            until docker compose ps --format json 2>/dev/null | \
              python3 -c "
          import sys, json
          lines = [l for l in sys.stdin if l.strip()]
          services = [json.loads(l) for l in lines]
          unhealthy = [s[\"Name\"] for s in services if s.get(\"Health\") not in (\"healthy\", \"\")]
          sys.exit(0 if not unhealthy else 1)
              "; do
              echo "  Still waiting..."
              docker compose ps
              sleep 5
            done
          '
          echo "All services healthy"

      - name: Submit a job through the frontend
        id: submit
        run: |
          JOB_RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Response: $JOB_RESPONSE"
          JOB_ID=$(echo "$JOB_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Submitted job: $JOB_ID"

      - name: Poll until job completes (max 60s)
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          echo "Polling job $JOB_ID..."
          timeout 60 bash -c "
            while true; do
              STATUS=\$(curl -sf http://localhost:3000/status/$JOB_ID | python3 -c \"import sys,json; print(json.load(sys.stdin)['status'])\")
              echo \"  Status: \$STATUS\"
              if [ \"\$STATUS\" = 'completed' ]; then
                echo 'Job completed successfully'
                exit 0
              fi
              sleep 3
            done
          "

      - name: Assert final status is completed
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          FINAL=$(curl -sf http://localhost:3000/status/$JOB_ID \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          echo "Final status: $FINAL"
          if [ "$FINAL" != "completed" ]; then
            echo "FAIL: expected 'completed', got '$FINAL'"
            exit 1
          fi
          echo "PASS: job status is 'completed'"

      - name: Tear down stack (always runs)
        if: always()
        run: |
          docker compose logs
          docker compose down -v --remove-orphans


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 6 — DEPLOY (main branch only, rolling update)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v5

      - name: Download SHA artifact
        uses: actions/download-artifact@v4
        with:
          name: build-sha

      - name: Set SHA env
        run: echo "SHA=$(cat sha.txt)" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env for deploy
        run: |
          printf 'REDIS_PASSWORD=deploy-secret\nQUEUE_NAME=jobs\n' > .env

      - name: Write compose override with new image tags
        run: |
          cat > compose.override.yml << EOF
          services:
            api:
              image: ${{ env.IMAGE_PREFIX }}/api:${{ env.SHA }}
              build: null
            worker:
              image: ${{ env.IMAGE_PREFIX }}/worker:${{ env.SHA }}
              build: null
            frontend:
              image: ${{ env.IMAGE_PREFIX }}/frontend:${{ env.SHA }}
              build: null
          EOF

      - name: Pull new images
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}/api:${{ env.SHA }}
          docker pull ${{ env.IMAGE_PREFIX }}/worker:${{ env.SHA }}
          docker pull ${{ env.IMAGE_PREFIX }}/frontend:${{ env.SHA }}

      # Start the "old" stack first so rolling_update has something to replace
      - name: Boot initial stack (simulates existing production)
        run: docker compose up -d --wait --timeout 120

      - name: Scripted rolling update
        run: |
          set -euo pipefail

          rolling_update() {
            local SERVICE=$1
            local NEW_IMAGE="${{ env.IMAGE_PREFIX }}/${SERVICE}:${{ env.SHA }}"

            echo "==> Rolling update: ${SERVICE} → ${NEW_IMAGE}"

            # Capture the currently running container id before we touch anything
            OLD_CONTAINER=$(docker compose ps -q ${SERVICE} 2>/dev/null || true)
            echo "  Old container: ${OLD_CONTAINER:-none}"

            # Rename the old container so the new one can take the canonical name
            if [ -n "${OLD_CONTAINER}" ]; then
              docker rename "${OLD_CONTAINER}" "${SERVICE}_old" || true
            fi

            # Start the new container (does not stop the old one yet)
            docker run -d               --name "${SERVICE}_new"               --network hng14-stage2-devops_internal               $([ "${SERVICE}" != "worker" ] && echo "--network hng14-stage2-devops_public")               --env-file .env               $([ "${SERVICE}" = "api" ]      && echo "-e REDIS_HOST=redis -e REDIS_PORT=6379 -e QUEUE_NAME=jobs")               $([ "${SERVICE}" = "worker" ]   && echo "-e REDIS_HOST=redis -e REDIS_PORT=6379 -e QUEUE_NAME=jobs")               $([ "${SERVICE}" = "frontend" ] && echo "-e API_URL=http://api:8000 -e PORT=3000")               "${NEW_IMAGE}"

            # Wait up to 60 s for the new container's healthcheck to go healthy
            echo "  Waiting up to 60s for ${SERVICE}_new to become healthy..."
            ELAPSED=0
            while [ ${ELAPSED} -lt 60 ]; do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' ${SERVICE}_new 2>/dev/null || echo "none")
              echo "  [${ELAPSED}s] health=${HEALTH}"
              if [ "${HEALTH}" = "healthy" ]; then
                echo "  ${SERVICE} is healthy — stopping old container"
                [ -n "${OLD_CONTAINER}" ] && docker stop "${OLD_CONTAINER}" && docker rm "${OLD_CONTAINER}" || true
                docker rename "${SERVICE}_new" "${SERVICE}"
                echo "  Done: ${SERVICE} rolled over successfully"
                return 0
              fi
              sleep 3
              ELAPSED=$((ELAPSED + 3))
            done

            # Health check timed out — abort, restore old container
            echo "  ABORT: ${SERVICE}_new did not become healthy within 60s"
            docker stop "${SERVICE}_new" && docker rm "${SERVICE}_new" || true
            if [ -n "${OLD_CONTAINER}" ]; then
              docker rename "${SERVICE}_old" "${OLD_CONTAINER}" || true
              docker start "${OLD_CONTAINER}" || true
              echo "  Old container restored"
            fi
            return 1
          }

          rolling_update api
          rolling_update worker
          rolling_update frontend

          echo "==> Rolling update complete"

      - name: Tear down (always)
        if: always()
        run: docker compose down -v --remove-orphans
